name: CI/CD

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION:     europe-west1
  IMAGE:      trace4artist

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          YOUTUBE_API_KEY:       fake-key-for-testing
          SPOTIFY_CLIENT_ID:     fake-spotify-id
          SPOTIFY_CLIENT_SECRET: fake-spotify-secret
          DATABASE_URL:          postgresql://fake:fake@localhost/fake
          REDIS_URL:             redis://localhost:6379/0
        run: pytest

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents:      read
      id-token:      write   # Indispensable pour Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE }}/${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE }}/${{ env.IMAGE }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE }}/${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE }}/${{ env.IMAGE }}:latest

      - name: Deploy API service
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: trace4artist-api
          region:  ${{ env.REGION }}
          image:   ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE }}/${{ env.IMAGE }}:${{ github.sha }}
          flags: --allow-unauthenticated
          env_vars: MODE=api
          secrets: |
            YOUTUBE_API_KEY=YOUTUBE_API_KEY:latest
            DATABASE_URL=DATABASE_URL:latest
            REDIS_URL=REDIS_URL:latest
            HUBSPOT_API_KEY=HUBSPOT_API_KEY:latest
            SPOTIFY_CLIENT_ID=SPOTIFY_CLIENT_ID:latest
            SPOTIFY_CLIENT_SECRET=SPOTIFY_CLIENT_SECRET:latest
            GOOGLE_SEARCH_API_KEY=GOOGLE_SEARCH_API_KEY:latest
            GOOGLE_SEARCH_CX=GOOGLE_SEARCH_CX:latest

      - name: Deploy Scheduler service
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: trace4artist-scheduler
          region:  ${{ env.REGION }}
          image:   ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE }}/${{ env.IMAGE }}:${{ github.sha }}
          flags: >-
            --no-cpu-throttling
            --min-instances=1
            --max-instances=1
            --port=8080
            --timeout=3600
            --concurrency=1
          env_vars: MODE=scheduler
          secrets: |
            YOUTUBE_API_KEY=YOUTUBE_API_KEY:latest
            DATABASE_URL=DATABASE_URL:latest
            REDIS_URL=REDIS_URL:latest
            HUBSPOT_API_KEY=HUBSPOT_API_KEY:latest
            SPOTIFY_CLIENT_ID=SPOTIFY_CLIENT_ID:latest
            SPOTIFY_CLIENT_SECRET=SPOTIFY_CLIENT_SECRET:latest
            GOOGLE_SEARCH_API_KEY=GOOGLE_SEARCH_API_KEY:latest
            GOOGLE_SEARCH_CX=GOOGLE_SEARCH_CX:latest

      - name: Deploy Worker service
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: trace4artist-worker
          region:  ${{ env.REGION }}
          image:   ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE }}/${{ env.IMAGE }}:${{ github.sha }}
          flags: >-
            --no-cpu-throttling
            --min-instances=1
            --max-instances=2
            --port=8080
            --timeout=3600
            --concurrency=1
          env_vars: MODE=worker
          secrets: |
            YOUTUBE_API_KEY=YOUTUBE_API_KEY:latest
            DATABASE_URL=DATABASE_URL:latest
            REDIS_URL=REDIS_URL:latest

      - name: Show API URL
        run: |
          echo "API deployee sur :"
          gcloud run services describe trace4artist-api \
            --region=${{ env.REGION }} \
            --format='value(status.url)'